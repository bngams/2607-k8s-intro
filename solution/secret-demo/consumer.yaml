apiVersion: v1
kind: Pod
metadata:
  name: consumer
  namespace: secret-demo
spec:
  restartPolicy: Never
  containers:
  - name: c
    image: busybox
    command: ["sh","-c","echo '--- ENV ---'; echo MONGODB_URL=$MONGODB_URL; echo '--- VOLUME ---'; cat /run/secrets/MONGODB_URL; echo; sleep 2"]
    env:
    - name: MONGODB_URL
      valueFrom:
        secretKeyRef:
          name: mongo
          key: mongo_url
    volumeMounts:
    - name: mongo-creds
      mountPath: /run/secrets
      readOnly: true
  volumes:
  - name: mongo-creds
    secret:
      secretName: mongo
      items:
      - key: mongo_url
        path: MONGODB_URL
