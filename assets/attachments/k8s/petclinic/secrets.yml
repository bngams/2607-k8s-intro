# Secret des identifiants MySQL - squelette a completer
# Present dans les DEUX namespaces : MySQL l'utilise pour creer l'utilisateur,
# l'app l'utilise pour se connecter.
#
# Encoder les valeurs (ex. utilisateur "petclinic" / mot de passe "petclinic") :
#   echo -n 'petclinic' | base64      -> cGV0Y2xpbmlj
#   (ou utiliser stringData: pour eviter l'encodage manuel)

apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: pet-clinic-db
type: Opaque
data:
  username: ____________     # TODO : base64 du nom d'utilisateur
  password: ____________     # TODO : base64 du mot de passe
---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: pet-clinic-app
type: Opaque
data:
  username: ____________     # TODO : meme valeur base64
  password: ____________     # TODO : meme valeur base64
